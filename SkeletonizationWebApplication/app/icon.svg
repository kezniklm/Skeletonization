<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad1)" filter="url(#shadow)"/>
  
  <!-- Skeleton/bone icon representation -->
  <g fill="white" opacity="0.95">
    <!-- Vertical bone -->
    <rect x="44" y="20" width="12" height="60" rx="6"/>
    
    <!-- Top horizontal -->
    <rect x="30" y="20" width="40" height="12" rx="6"/>
    
    <!-- Bottom horizontal -->
    <rect x="30" y="68" width="40" height="12" rx="6"/>
    
    <!-- Middle joints -->
    <circle cx="50" cy="35" r="7"/>
    <circle cx="50" cy="50" r="6"/>
    <circle cx="50" cy="65" r="7"/>
  </g>
  
  <!-- Highlight effect -->
  <circle cx="40" cy="30" r="8" fill="white" opacity="0.2"/>
</svg>
